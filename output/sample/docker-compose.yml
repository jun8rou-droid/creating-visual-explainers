services:
  postgres:
    image: postgres:16-alpine
    container_name: machining-quote-pg
    environment:
      POSTGRES_USER: machining
      POSTGRES_PASSWORD: machining
      POSTGRES_DB: machining_quote
    ports:
      - '5432:5432'
    volumes:
      - machining_quote_pg:/var/lib/postgresql/data

volumes:
  machining_quote_pg:
